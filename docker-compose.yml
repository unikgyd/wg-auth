version: "3.8"

services:
  vpn-authd:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: vpn-authd
    # 极度推荐使用 host 网络模式，这样能最大化 WireGuard 的 UDP 性能，并免去在容器内外做双重 NAT 的麻烦
    network_mode: "host"
    # 操作 Linux 内核网卡和路由必需的权限
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    # 如果遇到权限问题，可以暴力点开启 privileged: true
    # privileged: true
    volumes:
      # 直接挂载宿主机的绝对路径，这样你写在宿主机 /etc 下的配置就能直接透传给容器！
      - /etc/vpn-authd:/etc/vpn-authd
      - /etc/wireguard:/etc/wireguard
      - /var/lib/vpn-authd:/var/lib/vpn-authd
      # 映射证书目录 (比如 Let's Encrypt)，设置为只读 ro 更安全
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: unless-stopped
