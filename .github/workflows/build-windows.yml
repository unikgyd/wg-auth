name: Build Windows Client

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'windows/**'
      - 'windows-ui/**'
      - '.github/workflows/build-windows.yml'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'windows/**'
      - 'windows-ui/**'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure CMake for DLL
        run: cmake -B windows/client/build -S windows/client -DCMAKE_BUILD_TYPE=Release

      - name: Build authwg.dll
        run: cmake --build windows/client/build --config Release

      - name: Prepare windows-ui directory
        run: |
          # Copy the built DLL into the UI directory
          Copy-Item windows/client/build/Release/authwg.dll -Destination windows-ui/
          
          # Download official WireGuard MSI and extract wireguard.exe
          Invoke-WebRequest -Uri "https://download.wireguard.com/windows-client/wireguard-amd64-0.5.3.msi" -OutFile "wg.msi"
          # Extract MSI without installing it
          msiexec /a wg.msi /qb TARGETDIR="$PWD\wg-ext"
          # The extracted path is usually under the WireGuard folder inside TARGETDIR
          Copy-Item "$PWD\wg-ext\WireGuard\wireguard.exe" -Destination windows-ui/

      - name: Setup Lazarus
        uses: gcarq/setup-lazarus@v3.2
        with:
          lazarus-version: "stable"

      - name: Build Windows GUI (Lazarus)
        run: |
          cd windows-ui
          # Use lazbuild to compile the project via command line
          lazbuild authwgui.lpi --build-mode=Release

      - name: Upload Windows Client Artifact
        uses: actions/upload-artifact@v4
        with:
          name: auth-wg-windows-client
          path: windows-ui/authwgui.exe
